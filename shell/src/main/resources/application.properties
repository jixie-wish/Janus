spring.application.name=janus-shell
spring.main.web-application-type=none

# Keep process alive and show shell:> prompt (required in IDE unless terminal is emulated)
spring.shell.interactive.enabled=true

# Agent
janus.agent.tool-call.max-steps=30
janus.agent.janus.max-steps=30
janus.agent.janus.workspace-root=workspace/janus
janus.agent.janus.skills.dir=.agent/janus/skills
janus.agent.da.max-steps=30
janus.agent.da.workspace-root=workspace/da
janus.agent.da.skills.dir=.agent/da/skills
janus.agent.swe.max-steps=30
janus.agent.swe.workspace-root=workspace/swe
janus.agent.swe.skills.dir=.agent/swe/skills
janus.agent.default.skills.dir=.agent/default/skills
janus.agent.tool-call.skills.dir=.agent/tool-call/skills

# SenseNova via OpenAI-compatible API (Spring AI 2.x auto-config)
spring.ai.model.chat=openai
spring.ai.openai.api-key=sk-zxHA4Aee9gkxA8TLyw254pj1GVjeMYSg
spring.ai.openai.base-url=https://token.sensenova.cn/v1
# Spring AI 2.x: use chat.model (chat.options.model is deprecated and may not bind)
spring.ai.openai.chat.model=sensenova-6.7-flash-lite

